<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>My first form</title>
    <meta charset="utf-8" />
  </head>

  <body>

    <form onsubmit="validate(event)">
      <label for = "nom">Nom d'utilisateur</label>
      <input id="nom" type = "text" minlength="2" maxlength="5" required autofocus/>
      <br>

      <br>
      <lable for = "Adresse_mail">Adresse mail</lable>
      <input id="Adresse_mail" type = "email" placeholder="Saisir votre Adresse mail" min="2" max="5" required/>
      </br>

      <br>
      <lable for = "mot_de_passe">Mot de passe</lable>
      <input id="mot_de_passe" type = "password" min="5" max="20" required/>
      </br>

      <br>
      <lable for = "phone">Téléphone</lable>
      <input id="phone" type = "tel" placeholder="06 21 67 89 54"  required pattern="[0-9]{2} [0-9]{2} [0-9]{2} [0-9]{2} [0-9]{2}"/>
      </br>
 
      <br>
      <lable for = "naissance_date">Date de naissance</lable>
      <input id="naissance_date" type = "date" placeholder="Saisir votre date de naissance" required max="2007-07-27"/>
      </br>

      <br>
      <lable for = "commentaire">Ajouter un commentaire</lable>
      <textarea id = "commmentaire" placeholder="Entrez un texte ici..." cols="40" rows="3" spellcheck="true"></textarea>
      </br>

      <br>
      Genre :</br>
      <input type="radio" name="gender" value="Non listé" id="Non listé" checked />
      <label for="Non listé">Non listé</label>
      <br>


      <input type="radio" name="gender" value="Homme" id="Homme" checked />
      <label for="Homme">Homme</label>
      </br>

      <input type="radio" name="gender" value="Femme" id="Femme" checked />
      <label for="Femme">Femme</label>
      <br>

      <br>
      Titre :<select name="titre">
      <option value="Mx">Mx</option>
      <option value="Mr">Roland</option>
      <option value="Ms">Angela</option>
      <option value="Ms">Salvador</option>
      </select>
      
      <p><input type="checkbox" id="autorize_mail" name="autorize_mail">
      <label for="autorize_mail">Je souhaite de recevoir les communications par email</label></p>

      <label for="avatar">Avatar</label>
      <input type="file" id="avatar" accept="image/png, image/jpeg">
      <br>

      <br>
      <label for="color_picker">Choisissez une couleur</label>
      <input type="color" id="color_picker" value="#ADD8E6">
      </br>

      <br>
      <button type = "submit">Envoyer</button>

    </form>
  </body>
</html>
