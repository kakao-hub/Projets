<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Bonus</title>
        <meta charset="utf-8" />
    </head>

    <body>
        <h1>Inscription</h1>
        <form onsubmit="validate(event)">
            <br>
            <label for = "nom">Nom </label>
            <input id="nom" type = "text" placeholder="Entrez votre nom" minlength="3" required autofocus/>
            </br>

            <br>
            <label for = "name">Prénom </label>
            <input id="name" type = "text" placeholder="Entrez votre prénom" minlength="3"/>
            </br>

            <br>
            <lable for = "comment">Adresse</lable>
            <textarea id = "commment" placeholder="Entrez votre adresse ici..." cols="25" rows="10" spellcheck="true"></textarea>
            </br>

            <br>
            <lable for = "phone">Téléphone</lable>
            <input id="phone" type = "tel" placeholder="01 23 45 67 89"  required pattern="[0-9]{2} [0-9]{2} [0-9]{2} [0-9]{2} [0-9]{2}"/>
            </br>

            <br>
            <lable for = "naissance_date">Date de naissance</lable>
            <input id="naissance_date" type = "date"/>
            </br>

            <br>
            <lable for = "mot_de_passe">Mot de passe</lable>
            <input id="mot_de_passe" type = "password" placeholder="Entrez votre mot de passe" required  pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#+\-_])[A-Za-z\d@$!%*?&#+\-_]{8,}$"/>
            </br>

            <br>
            <button type = "submit">Envoyer</button>
            <button type = "reset">Reset</button>
            </br>
            <link rel="stylesheet" type="text/css" href="Bonus.css" />
        </form>
    
    </body>






</html>
